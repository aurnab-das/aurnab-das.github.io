<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 — Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
          rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:           #0B0F1A;
          --surface:      #141824;
          --surface-alt:  #1E2336;
          --border:       #2D3554;
          --primary:      #0A84FF;
          --primary-light:#40A9FF;
          --accent:       #00D4AA;
          --accent-warm:  #FF6B35;
          --purple:       #6C47FF;
          --text:         #F0F4FF;
          --text-muted:   #6B7A99;
        }

        html, body {
          height: 100%;
          background: var(--bg);
          color: var(--text);
          font-family: 'Syne', sans-serif;
          overflow: hidden;
        }

        /* ── Animated mesh background ── */
        .bg-mesh {
          position: fixed;
          inset: 0;
          z-index: 0;
          overflow: hidden;
        }
        .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(100px);
          opacity: 0.18;
          animation: drift 12s ease-in-out infinite alternate;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--primary);  top: -150px; left: -100px; animation-duration: 14s; }
        .orb-2 { width: 400px; height: 400px; background: var(--purple);   bottom: -100px; right: -80px; animation-duration: 11s; animation-delay: -4s; }
        .orb-3 { width: 300px; height: 300px; background: var(--accent);   top: 40%; left: 55%; animation-duration: 16s; animation-delay: -7s; }

        @keyframes drift {
          from { transform: translate(0, 0) scale(1); }
          to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* ── Grid overlay ── */
        .grid-overlay {
          position: fixed;
          inset: 0;
          z-index: 0;
          background-image:
            linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
          background-size: 48px 48px;
        }

        /* ── Main layout ── */
        .container {
          position: relative;
          z-index: 1;
          height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 0;
          padding: 2rem;
          text-align: center;
        }

        /* ── 404 giant number ── */
        .error-code {
          font-family: 'Space Mono', monospace;
          font-size: clamp(7rem, 20vw, 14rem);
          font-weight: 700;
          line-height: 1;
          letter-spacing: -4px;
          background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 50%, var(--accent) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          position: relative;
          animation: fadeDown 0.7s cubic-bezier(.22,1,.36,1) both;
        }

        /* Glitch flicker */
        .error-code::before,
        .error-code::after {
          content: '404';
          position: absolute;
          inset: 0;
          background: inherit;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        .error-code::before {
          left: 2px;
          animation: glitch-r 3.5s infinite steps(1);
          background: linear-gradient(135deg, var(--accent-warm), var(--primary));
          -webkit-background-clip: text;
          background-clip: text;
          opacity: 0;
        }
        .error-code::after {
          left: -2px;
          animation: glitch-l 3.5s infinite steps(1);
          background: linear-gradient(135deg, var(--accent), var(--purple));
          -webkit-background-clip: text;
          background-clip: text;
          opacity: 0;
        }

        @keyframes glitch-r {
          0%,90%,100% { opacity: 0; clip-path: none; }
          91%          { opacity: 0.6; clip-path: inset(10% 0 70% 0); }
          93%          { opacity: 0.6; clip-path: inset(60% 0 10% 0); }
          95%          { opacity: 0; }
        }
        @keyframes glitch-l {
          0%,88%,100% { opacity: 0; clip-path: none; }
          89%          { opacity: 0.5; clip-path: inset(30% 0 50% 0); }
          91%          { opacity: 0.5; clip-path: inset(55% 0 20% 0); }
          93%          { opacity: 0; }
        }

        /* ── Divider line ── */
        .divider {
          width: clamp(60px, 12vw, 120px);
          height: 2px;
          background: linear-gradient(90deg, var(--primary), var(--accent));
          border-radius: 2px;
          margin: 0.5rem auto 1.6rem;
          animation: fadeUp 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
        }

        /* ── Headline & sub ── */
        .headline {
          font-size: clamp(1.4rem, 3.5vw, 2.2rem);
          font-weight: 800;
          letter-spacing: -0.5px;
          color: var(--text);
          animation: fadeUp 0.7s 0.3s cubic-bezier(.22,1,.36,1) both;
        }

        .subtext {
          margin-top: 0.75rem;
          font-family: 'Space Mono', monospace;
          font-size: clamp(0.75rem, 1.5vw, 0.9rem);
          color: var(--text-muted);
          max-width: 380px;
          line-height: 1.7;
          animation: fadeUp 0.7s 0.4s cubic-bezier(.22,1,.36,1) both;
        }

        /* ── Home button ── */
        .btn-home {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          margin-top: 2.4rem;
          padding: 0.85rem 2.2rem;
          border-radius: 10px;
          border: none;
          cursor: pointer;
          font-family: 'Syne', sans-serif;
          font-size: 1rem;
          font-weight: 700;
          letter-spacing: 0.3px;
          color: #fff;
          background: linear-gradient(135deg, var(--primary) 0%, var(--purple) 100%);
          box-shadow: 0 0 0 0 rgba(10,132,255,0.4);
          position: relative;
          overflow: hidden;
          text-decoration: none;
          animation: fadeUp 0.7s 0.55s cubic-bezier(.22,1,.36,1) both;
          transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-home::after {
          content: '';
          position: absolute;
          inset: 0;
          background: rgba(255,255,255,0.08);
          opacity: 0;
          transition: opacity 0.2s;
        }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(10,132,255,0.4); }
        .btn-home:hover::after { opacity: 1; }
        .btn-home:active { transform: translateY(0); }

        .btn-home svg {
          width: 18px; height: 18px;
          transition: transform 0.2s;
        }
        .btn-home:hover svg { transform: translateX(-3px); }

        /* ── Status badge ── */
        .status-badge {
          margin-top: 2rem;
          display: inline-flex;
          align-items: center;
          gap: 7px;
          padding: 5px 14px;
          border-radius: 99px;
          background: var(--surface-alt);
          border: 1px solid var(--border);
          font-family: 'Space Mono', monospace;
          font-size: 0.7rem;
          color: var(--text-muted);
          animation: fadeUp 0.7s 0.65s cubic-bezier(.22,1,.36,1) both;
        }
        .status-dot {
          width: 7px; height: 7px;
          border-radius: 50%;
          background: var(--accent-warm);
          animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
          0%,100% { opacity: 1; transform: scale(1); }
          50%      { opacity: 0.5; transform: scale(0.7); }
        }

        /* ── Entrance animations ── */
        @keyframes fadeDown {
          from { opacity: 0; transform: translateY(-30px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>

<div class="container">
    <div class="error-code">404</div>
    <div class="divider"></div>
    <h1 class="headline">Page Not Found</h1>
    <p class="subtext">The page you're looking for doesn't exist or has been moved. Let's get you
        back on track.</p>

    <a href="/" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back to Home
    </a>

    <div class="status-badge">
        <span class="status-dot"></span>
        ERROR 404 — ROUTE NOT MATCHED
    </div>
</div>

</body>
</html>
